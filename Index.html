<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom & Arthur | Impressão 3D</title>
    <style>
        /* Estilização básica */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; margin: 0; color: #333; }
        header { background-color: #2c3e50; color: white; text-align: center; padding: 2rem; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        
        /* Card do Produto */
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; padding: 15px; text-align: center; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        
        button { background-color: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; width: 100%; }
        button:hover { background-color: #219150; }
    </style>
</head>
<body>

<header>
    <h1>Dom & Arthur</h1>
    <p>Tecnologia e Criatividade em Impressão 3D</p>
</header>

<div id="loja" class="container">
    <!-- Os produtos serão carregados aqui pelo JavaScript -->
</div>

<script>
    // --- CONFIGURAÇÃO ---
    // Substitua a URL abaixo pelo link do seu arquivo .json no GitHub
    const urlJSON = 'https://raw.githubusercontent.com/a30208777-ai/Dom-modelos-3d/refs/heads/Arquivos-do-siye/Arquivos.json';
    const linkFormulario = 'LINK_DO_SEU_GOOGLE_FORMULARIO';

    fetch(urlJSON)
        .then(response => response.json())
        .then(data => {
            const loja = document.getElementById('loja');
            data.forEach(item => {
                loja.innerHTML += `
                    <div class="card">
                        <img src="${item.imagens[0]}" alt="${item.nome}">
                        <h3>${item.nome}</h3>
                        <p><strong>Preço:</strong> ${item.preco}</p>
                        <p><strong>Tempo:</strong> ${item.tempo}</p>
                        <p><strong>Gasto:</strong> ${item.gasto}</p>
                        <a href="${linkFormulario}" target="_blank" style="text-decoration: none;">
                            <button>Solicitar este modelo</button>
                        </a>
                    </div>
                `;
            });
        })
        .catch(error => {
            console.error('Erro ao carregar os dados:', error);
            document.getElementById('loja').innerHTML = '<p>Erro ao carregar modelos. Verifique o link do JSON.</p>';
        });
</script>

</body>
  </html>
